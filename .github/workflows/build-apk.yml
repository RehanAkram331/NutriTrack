name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'caloriecanvas-android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools & platform
        run: |
          sdkmanager --install "platform-tools" "platforms;android-35" "build-tools;35.0.0" --sdk_root=$ANDROID_SDK_ROOT

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > caloriecanvas-android/local.properties

      - name: Setup Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.9 --distribution-type bin
        working-directory: caloriecanvas-android

      - name: Make gradlew executable
        run: chmod +x caloriecanvas-android/gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace
        working-directory: caloriecanvas-android

      - name: Copy APK to public folder
        run: |
          mkdir -p public
          cp caloriecanvas-android/app/build/outputs/apk/debug/app-debug.apk public/caloriecanvas.apk
          echo "APK size: $(du -sh public/caloriecanvas.apk)"

      - name: Commit & push APK
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/caloriecanvas.apk
          git diff --staged --quiet || (git commit -m "chore: update Android APK [skip ci]" && git push)
